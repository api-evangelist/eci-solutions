aid: eci-solutions
name: ECI Solutions
description: >-
  ECI Solutions is a leading provider of cloud-based business management software
  for small and medium-sized businesses across manufacturing, distribution, building
  and construction, field service, and retail. ECI's integrated suites span ERP,
  e-commerce, CRM, accounting, inventory, and analytics, helping customers streamline
  operations and grow.
