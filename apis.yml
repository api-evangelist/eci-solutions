apis:
  - aid: eci-solutions:eci-solutions-platform
    name: ECI Solutions Platform API
    description: >-
      The ECI Solutions platform exposes integration points across its ERP and
      business management suites (including JobBOSS2, M1, Macola, DDMSPLUS, RockSolid,
      Bolt, and others) to connect with third-party e-commerce, CRM, accounting,
      and field-service tools. Public OpenAPI documentation is not currently
      available; integrations are typically arranged via the relevant product
      support channel or partner program.
